<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#FF6B35">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>공짜병법</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:'Pretendard',-apple-system,sans-serif;background:#f5f5f5;color:#333;min-height:100vh;max-width:480px;margin:0 auto;position:relative;overflow-x:hidden;-webkit-tap-highlight-color:transparent}

  .status-bar{background:linear-gradient(135deg,#FF6B35,#FF8F5E);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(255,107,53,0.3)}
  .status-bar h1{font-size:18px;font-weight:800;display:flex;align-items:center;gap:6px}
  .status-bar h1 img{width:26px;height:26px;border-radius:6px}
  .status-bar .loc{font-size:11px;opacity:0.85;margin-top:2px}
  .update-info{text-align:right}
  .update-time{font-size:10px;opacity:0.7}
  .my-district{font-size:11px;font-weight:600;opacity:0.9}

  .search-box{padding:10px 16px;background:#fff;border-bottom:1px solid #eee}
  .search-wrap{position:relative}
  .search-input{width:100%;padding:10px 40px 10px 14px;border:2px solid #eee;border-radius:12px;font-size:14px;font-family:inherit;outline:none;background:#f9f9f9;transition:all 0.2s}
  .search-input:focus{border-color:#FF6B35;background:#fff;box-shadow:0 0 0 3px rgba(255,107,53,0.1)}
  .search-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:18px;cursor:pointer;color:#999;padding:4px}

  .cat-tabs{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;background:#fff;border-bottom:1px solid #eee;-webkit-overflow-scrolling:touch}
  .cat-tabs::-webkit-scrollbar{display:none}
  .cat-tab{padding:7px 13px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;border:1.5px solid #eee;background:#fff;color:#888;font-family:inherit;transition:all 0.2s}
  .cat-tab.active{background:#FF6B35;color:#fff;border-color:#FF6B35}

  .content{padding:12px 16px;padding-bottom:80px}
  .section{display:none}
  .section.active{display:block}

  .card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.06);border:1px solid #f0f0f0;transition:transform 0.15s;position:relative}
  .card:active{transform:scale(0.98)}
  .card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .card-badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px}
  .badge-free{background:#E8F5E9;color:#2E7D32}
  .badge-cheap{background:#FFF3E0;color:#E65100}
  .badge-event{background:#E3F2FD;color:#1565C0}
  .badge-class{background:#F3E5F5;color:#7B1FA2}
  .card-fav{background:none;border:none;font-size:18px;cursor:pointer;padding:2px 4px;color:#ddd;transition:color 0.2s}
  .card-fav.saved{color:#FF6B35}
  .card-title{font-size:14px;font-weight:700;color:#222;margin-bottom:4px;line-height:1.4}
  .card-desc{font-size:12px;color:#888;line-height:1.5;margin-bottom:6px}
  .card-meta{font-size:11px;color:#aaa;display:flex;justify-content:space-between;align-items:center}
  .card-dist{color:#FF6B35;font-weight:600}

  .place-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,0.06);border:1px solid #f0f0f0;cursor:pointer;transition:transform 0.15s}
  .place-card:active{transform:scale(0.98)}
  .place-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .place-name{font-size:14px;font-weight:700;color:#222}
  .place-desc{font-size:12px;color:#888;line-height:1.5;margin-bottom:6px}
  .place-meta{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#aaa}
  .place-actions{display:flex;gap:6px;margin-top:8px}
  .place-action-btn{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;border:none;cursor:pointer;font-family:inherit}
  .place-action-btn.navi{background:#FF6B35;color:#fff}
  .place-action-btn.share{background:#f0f0f0;color:#666}

  .ad-banner{background:linear-gradient(135deg,#f9f9f9,#f0f0f0);border:1px dashed #ddd;border-radius:10px;padding:16px;text-align:center;margin:12px 0;font-size:11px;color:#bbb}

  .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #eee;display:flex;justify-content:space-around;padding:6px 0 max(10px,env(safe-area-inset-bottom));z-index:100}
  .nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:#999;font-size:10px;font-weight:600;transition:color 0.2s;position:relative}
  .nav-item.active{color:#FF6B35}
  .nav-icon{font-size:20px}
  .nav-badge{position:absolute;top:-2px;right:-2px;background:#FF6B35;color:#fff;font-size:8px;font-weight:700;padding:1px 4px;border-radius:8px;min-width:14px;text-align:center}

  .empty{text-align:center;padding:40px 20px;color:#bbb;font-size:13px;line-height:1.6}
  .loading{text-align:center;padding:30px;color:#bbb;font-size:13px}
  .loading::after{content:'';display:inline-block;width:16px;height:16px;border:2px solid #eee;border-top-color:#FF6B35;border-radius:50%;animation:spin 0.8s linear infinite;margin-left:8px;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}
  .skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;height:80px;margin-bottom:10px}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

  .source-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .src-link{padding:5px 10px;background:#fff;border:1px solid #eee;border-radius:8px;font-size:11px;color:#FF6B35;text-decoration:none;font-weight:600}

  /* Map */
  .map-view{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:90;background:#f5f5f5}
  .map-view.active{display:flex;flex-direction:column}
  .map-header{background:linear-gradient(135deg,#FF6B35,#FF8F5E);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;z-index:91}
  .map-header h2{font-size:16px;font-weight:800}
  .map-close{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:4px 8px;font-weight:700}
  .map-container{flex:1;position:relative}
  #kakaoMap{width:100%;height:100%}
  .map-category-bar{position:absolute;top:10px;left:10px;right:10px;z-index:92;display:flex;gap:6px;overflow-x:auto;padding-bottom:4px}
  .map-category-bar::-webkit-scrollbar{display:none}
  .map-cat{padding:6px 12px;border-radius:18px;font-size:11px;font-weight:700;cursor:pointer;border:none;background:#fff;color:#666;box-shadow:0 1px 4px rgba(0,0,0,0.15);font-family:inherit}
  .map-cat.active{background:#FF6B35;color:#fff}
  .map-count{position:absolute;top:50px;right:10px;z-index:92;background:rgba(0,0,0,0.6);color:#fff;font-size:10px;font-weight:600;padding:4px 10px;border-radius:10px}
  .map-controls{position:absolute;bottom:20px;right:16px;z-index:92;display:flex;flex-direction:column;gap:8px}
  .map-ctrl-btn{width:44px;height:44px;border-radius:50%;background:#fff;border:none;box-shadow:0 2px 8px rgba(0,0,0,0.2);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
  .map-info-card{position:absolute;bottom:50%;left:16px;right:16px;transform:translateY(50%);z-index:93;background:#fff;border-radius:14px;padding:16px 16px 14px;box-shadow:0 4px 20px rgba(0,0,0,0.15);display:none;animation:slideUp 0.2s ease;max-height:50vh;overflow-y:auto}
  .map-info-card.show{display:block}
  @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
  .map-info-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;margin-bottom:6px}
  .map-info-title{font-size:15px;font-weight:700;margin-bottom:4px}
  .map-info-desc{font-size:12px;color:#888;margin-bottom:4px;line-height:1.4}
  .map-info-addr{font-size:11px;color:#aaa;margin-bottom:10px}
  .map-info-dist{font-size:11px;color:#FF6B35;font-weight:600;margin-bottom:10px}
  .map-info-actions{display:flex;gap:8px}
  .map-info-btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:inherit;flex:1;text-align:center}
  .map-info-btn.primary{background:#FF6B35;color:#fff}
  .map-info-btn.secondary{background:#f0f0f0;color:#666}

  /* MY Page */
  .my-page{display:none}
  .my-page.active{display:block}
  .my-section{background:#fff;margin:12px 16px;border-radius:14px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
  .my-section-title{font-size:13px;font-weight:700;color:#222;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #f0f0f0}
  .my-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f9f9f9;font-size:13px}
  .my-item:last-child{border:none}
  .my-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;text-align:center}
  .my-stat{background:#FFF8F4;border-radius:10px;padding:14px 8px}
  .my-stat-num{font-size:20px;font-weight:800;color:#FF6B35}
  .my-stat-label{font-size:10px;color:#999;margin-top:4px}

  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:10px;font-size:12px;font-weight:600;z-index:200;opacity:0;transition:opacity 0.3s;pointer-events:none;max-width:300px;text-align:center}
  .toast.show{opacity:1}
</style>
</head>
<body>

<div class="status-bar">
  <div>
    <h1><img src="icon-192.png" alt="">공짜병법</h1>

  </div>
</div>

<div class="search-box">

    <button class="search-btn" id="searchBtn">&#x1F50D;</button>

<div class="cat-tabs" id="catTabs">

</div>

<div class="main-content" id="mainContent">
<div class="content">
  <div class="section active" id="sec-nearby">
    <div id="items-nearby"><div class="loading">내 주변 공짜 검색 중...</div></div>

  </div>

    <div id="items-news"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>

      <div class="my-stat"><div class="my-stat-num" id="statFav">0</div><div class="my-stat-label">즐겨찾기</div></div>

      <div class="my-stat"><div class="my-stat-num" id="statPlaces">0</div><div class="my-stat-label">발견 장소</div></div>

  </div>
  <div class="my-section">
    <div class="my-section-title">설정</div>
    <div class="my-item"><span>캐시 데이터</span><button id="clearCacheBtn" style="background:#f0f0f0;border:none;border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:inherit">삭제</button></div>
    <div class="my-item"><span>버전</span><span style="font-weight:600">2.0.0</span></div>
  </div>
  <div class="my-section" style="text-align:center;color:#bbb;font-size:11px;padding:20px">
    공짜병법 v2.0 — 전국 무료/착한가격 정보<br>
    Made with &#x2764; for everyone
  </div>
</div>
</div>

<!-- Map View -->
<div class="map-view" id="mapView">
  <div class="map-header">
    <h2 id="mapTitle">내 주변 공짜 찾기</h2>
    <button class="map-close" id="mapClose">&#x2715;</button>
  </div>
  <div class="map-container">
    <div class="map-category-bar">
      <button class="map-cat active" data-mcat="all">전체</button>
      <button class="map-cat" data-mcat="cheap">착한가격</button>

        <button class="map-info-btn primary" id="mapInfoNavi">길찾기</button>
        <button class="map-info-btn secondary" id="mapInfoShare">공유</button>
      </div>
      <div style="background:#f9f9f9;border:1px dashed #ddd;border-radius:6px;padding:8px;text-align:center;margin-top:10px;font-size:10px;color:#bbb">광고 영역 (AdSense 320x50)</div>
      <button id="mapInfoClose" style="position:absolute;top:8px;right:12px;background:none;border:none;font-size:18px;color:#ccc;cursor:pointer;padding:4px">&#x2715;</button>

<div class="bottom-nav">
  <div class="nav-item active" data-nav="home"><div class="nav-icon">&#x1F3E0;</div>홈</div>
  <div class="nav-item" data-nav="map"><div class="nav-icon">&#x1F5FA;</div>지도</div>
  <div class="nav-item" data-nav="partner"><div class="nav-icon">&#x1F91D;</div>제휴문의</div>
  <div class="nav-item" data-nav="my"><div class="nav-icon">&#x1F464;</div>MY</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== CONFIG =====
const KAKAO_APP_KEY = 'ce765ea76cec4f89f8af6f81c6e464c1';

// ===== UTILITIES =====
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function getDistance(lat1,lng1,lat2,lng2){const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180,a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))}
function formatDist(km){if(km<0.1)return Math.round(km*1000)+'m';if(km<1)return(km*1000).toFixed(0)+'m';return km.toFixed(1)+'km'}

// ===== STORAGE =====
const S={get(k,d){try{return JSON.parse(localStorage.getItem('gbb_'+k))||d}catch{return d}},set(k,v){localStorage.setItem('gbb_'+k,JSON.stringify(v))}};
let favorites=S.get('favorites',[]);
let searchCount=S.get('searchCount',0);
let totalPlaces=0;
function isFav(id){return favorites.includes(id)}
function toggleFav(id,name){const i=favorites.indexOf(id);if(i>-1){favorites.splice(i,1);toast(name+' 즐겨찾기 해제')}else{favorites.push(id);toast(name+' 즐겨찾기 추가!')}S.set('favorites',favorites);updateFavBadge();return isFav(id)}
function updateFavBadge(){const b=document.getElementById('favBadge');if(favorites.length>0){b.style.display='';b.textContent=favorites.length}else{b.style.display='none'}}

// ===== GPS =====
let myLat=null,myLng=null,myCity='',myDistrict='';

function initGPS(){
  if(!navigator.geolocation)return;
  navigator.geolocation.getCurrentPosition(pos=>{
    myLat=pos.coords.latitude;myLng=pos.coords.longitude;
    onLocationReady();
  },()=>{
    document.getElementById('myLocationText').textContent='위치를 찾을 수 없습니다';
    // 기본값: 서울시청
    myLat=37.5665;myLng=126.9780;myCity='서울';myDistrict='중구';
    onLocationReady();
  },{enableHighAccuracy:true,timeout:8000});

  navigator.geolocation.watchPosition(pos=>{
    myLat=pos.coords.latitude;myLng=pos.coords.longitude;
  },()=>{},{enableHighAccuracy:true});
}

function onLocationReady(){
  document.getElementById('myLocationText').textContent=myLat.toFixed(4)+', '+myLng.toFixed(4);
  // 카카오 역지오코딩으로 지역명 파악
  waitForKakao(()=>{
    const geocoder=new kakao.maps.services.Geocoder();
    geocoder.coord2RegionCode(myLng,myLat,(result,status)=>{
      if(status===kakao.maps.services.Status.OK&&result[0]){
        const r=result[0];
        myCity=r.region_1depth_name||'';
        myDistrict=r.region_2depth_name||'';
        document.getElementById('myLocationText').textContent=myCity+' '+myDistrict;
        document.getElementById('myDistrict').textContent=myDistrict;
        document.getElementById('mapTitle').textContent=myDistrict+' 주변 공짜 찾기';
      }
      // 위치 기반 데이터 로드
      loadNearbyPlaces();
      loadCheapPlaces();
      loadFreePlaces();
      loadNews();
      loadEvents();
    });
  });
}

function waitForKakao(cb){
  if(typeof kakao!=='undefined'&&kakao.maps&&kakao.maps.services){cb();return}
  let t=0;const timer=setInterval(()=>{t++;if(typeof kakao!=='undefined'&&kakao.maps&&kakao.maps.services){clearInterval(timer);cb()}else if(t>=20){clearInterval(timer)}},300);
}

// ===== KAKAO LOCAL API — 장소 검색 =====
let kakaoPlaces=null;
function searchPlaces(keyword,callback,options={}){
  waitForKakao(()=>{
    if(!kakaoPlaces)kakaoPlaces=new kakao.maps.services.Places();
    const opts={x:myLng,y:myLat,radius:options.radius||3000,size:15,sort:kakao.maps.services.SortBy.DISTANCE};
    kakaoPlaces.keywordSearch(keyword,(data,status)=>{
      if(status===kakao.maps.services.Status.OK){callback(data)}
      else{callback([])}
    },opts);
  });
}

// ===== LOAD NEARBY (ALL CATEGORIES) =====
function loadNearbyPlaces(){
  const container=document.getElementById('items-nearby');
  container.innerHTML='<div class="loading">내 주변 검색 중...</div>';
  const keywords=['착한가격업소','무료주차장','도서관','공원','체육센터','문화센터','무료강좌'];
  let allResults=[];
  let done=0;
  keywords.forEach(kw=>{
    searchPlaces(kw,(data)=>{
      allResults=allResults.concat(data.map(d=>({...d,_cat:kw})));
      done++;
      if(done===keywords.length){
        // 중복 제거
        const seen=new Set();
        allResults=allResults.filter(p=>{if(seen.has(p.id))return false;seen.add(p.id);return true});
        // 거리순 정렬
        allResults.sort((a,b)=>(parseFloat(a.distance)||9999)-(parseFloat(b.distance)||9999));

function matchPrice(name){
  if(!window._cheapData||!name)return '';
  const found=window._cheapData.find(s=>s.n&&(s.n.includes(name)||name.includes(s.n)));
  if(!found)return '';
  const menus=[];
  if(found.m1&&found.p1)menus.push(found.m1+' '+Number(found.p1).toLocaleString()+'원');
  if(found.m2&&found.p2)menus.push(found.m2+' '+Number(found.p2).toLocaleString()+'원');
  if(found.m3&&found.p3)menus.push(found.m3+' '+Number(found.p3).toLocaleString()+'원');
  return menus.join(' / ');
}

function sortByDistance(stores,callback){
  if(!myLat||!myLng){callback(stores);return}
  waitForKakao(()=>{
    const geocoder=new kakao.maps.services.Geocoder();
    let done=0;
    stores.forEach(s=>{
      if(!s.주소){s._dist=99999;done++;if(done===stores.length){stores.sort((a,b)=>a._dist-b._dist);callback(stores)}return}
      geocoder.addressSearch(s.주소,(result,status)=>{
        if(status===kakao.maps.services.Status.OK&&result[0]){
          s._lat=parseFloat(result[0].y);s._lng=parseFloat(result[0].x);
          s._dist=getDistance(myLat,myLng,s._lat,s._lng);
        }else{s._dist=99999}
        done++;
        if(done===stores.length){stores.sort((a,b)=>a._dist-b._dist);callback(stores)}
      });
    });
  });
}

  }

        <span class="card-badge ${badge}">${label}</span>
        <span class="card-dist">${dist}</span>
      </div>
      <div class="place-name">${p.place_name||''}</div>
      ${priceInfo}
      <div class="place-desc">${catDetail}${phone?' · '+phone:''}</div>
      <div class="place-meta">
        <span style="${isCheap?'font-weight:700;color:#333':''}">${addr}</span>
      </div>
      <div class="place-actions">
        <button class="place-action-btn navi" onclick="event.stopPropagation();window.open('https://map.kakao.com/link/to/${encodeURIComponent(p.place_name)},${p.y},${p.x}','_blank')">길찾기</button>

function getBadgeLabel(p,catId){
  const name=(p.place_name||'').toLowerCase();
  const cat=(p.category_group_name||p._cat||'').toLowerCase();
  if(cat.includes('착한가격')||name.includes('착한가격'))return '착한가격';
  if(cat.includes('도서관')||name.includes('도서관'))return '도서관';
  if(cat.includes('공원')||name.includes('공원'))return '공원';
  if(cat.includes('주차')||name.includes('주차'))return '무료주차';
  if(cat.includes('체육')||name.includes('체육'))return '체육시설';
  if(cat.includes('문화')||name.includes('문화'))return '문화시설';
  const labels={nearby:'주변',cheap:'착한가격',free:'무료시설',class:'강좌'};
  return labels[catId]||'정보';
}

function loadRSS(container,feedUrl,badgeText){
  fetch(RSS2JSON+encodeURIComponent(feedUrl))
    .then(r=>r.json())
    .then(json=>{
      if(json.status==='ok'&&json.items){
        let items=json.items.slice(0,12);
        items.sort((a,b)=>new Date(b.pubDate||0)-new Date(a.pubDate||0));
        renderNewsCards(container,items,badgeText);
      }else throw new Error();
    })
    .catch(()=>{
      container.innerHTML='<div class="empty">데이터를 불러올 수 없습니다.</div>';
    });
}

function renderNewsCards(container,items,badgeText){
  if(!items.length){container.innerHTML='<div class="empty">관련 정보가 없습니다.</div>';return}
  container.innerHTML=items.map(item=>{
    const date=item.pubDate?new Date(item.pubDate).toLocaleDateString('ko-KR'):'';
    const title=(item.title||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const link=(item.link||'#').replace(/"/g,'&quot;');
    const desc=(item.description||'').replace(/<[^>]+>/g,'').replace(/&[^;]+;/g,' ').slice(0,100);
    return `<div class="card"><a href="${link}" target="_blank" rel="noopener">
      <div class="card-top"><span class="card-badge badge-event">${badgeText}</span></div>
      <div class="card-title">${title}</div>
      <div class="card-desc">${desc}</div>
      <div class="card-meta"><span>${date}</span><span>${myCity||''}</span></div>
    </a></div>`;
  }).join('');
}

          <button onclick="submitPartner()" style="background:#FF6B35;color:#fff;border:none;padding:12px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">문의 보내기</button>
        </div>
      </div>
      `;
    main.appendChild(partnerDiv);
  }
  partnerDiv.style.display='block';
}

function submitPartner(){
  const name=document.getElementById('partnerName').value.trim();
  const contact=document.getElementById('partnerContact').value.trim();
  const type=document.getElementById('partnerType').value;
  const msg=document.getElementById('partnerMsg').value.trim();
  if(!name||!contact){toast('업체명과 연락처를 입력해주세요');return}
  // 이메일로 전송 (mailto)
  const body='업체명: '+name+'%0A연락처: '+contact+'%0A유형: '+type+'%0A내용: '+msg;
  window.open('mailto:ptodak@naver.com?subject='+encodeURIComponent('[공짜병법] 제휴문의 - '+name)+'&body='+body);
  toast('문의가 접수되었습니다!');
  document.getElementById('partnerName').value='';
  document.getElementById('partnerContact').value='';
  document.getElementById('partnerMsg').value='';
}

// ===== MAP =====
let kakaoMap,mapMarkers=[],myMarker,mapCircle,infoSelectedPlace=null;

function openMap(){
  document.getElementById('mapView').classList.add('active');
  if(!kakaoMap){
    waitForKakao(()=>{
      const center=(myLat&&myLng)?new kakao.maps.LatLng(myLat,myLng):new kakao.maps.LatLng(37.5665,126.9780);
      kakaoMap=new kakao.maps.Map(document.getElementById('kakaoMap'),{center:center,level:5});
      showMyMarker();
      searchAndShowMarkers('all');

      // 지도 이동/줌 시 자동 재검색 (정보카드 열려있으면 스킵)
      let searchTimer=null;
      kakao.maps.event.addListener(kakaoMap,'idle',()=>{
        if(document.getElementById('mapInfoCard').classList.contains('show'))return;
        clearTimeout(searchTimer);
        searchTimer=setTimeout(()=>{
          const activeCat=document.querySelector('.map-cat.active');
          searchAndShowMarkers(activeCat?activeCat.dataset.mcat:'all');
        },500);
      });

      document.querySelectorAll('.map-cat').forEach(btn=>{
        btn.addEventListener('click',()=>{
          document.querySelectorAll('.map-cat').forEach(b=>b.classList.remove('active'));
          btn.classList.add('active');
          searchAndShowMarkers(btn.dataset.mcat);
        });
      });
    });
  }else{
    kakaoMap.relayout();
    if(myLat&&myLng)kakaoMap.setCenter(new kakao.maps.LatLng(myLat,myLng));
  }
}

function showMyMarker(){
  if(!myLat||!myLng||!kakaoMap)return;
  if(myMarker)myMarker.setMap(null);
  myMarker=new kakao.maps.CustomOverlay({
    position:new kakao.maps.LatLng(myLat,myLng),
    content:'<div style="position:relative"><div style="width:16px;height:16px;background:#4285F4;border:3px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.3)"></div></div>',
    yAnchor:0.5,xAnchor:0.5
  });
  myMarker.setMap(kakaoMap);
}

function searchAndShowMarkers(cat){
  mapMarkers.forEach(m=>m.setMap(null));
  mapMarkers=[];
  document.getElementById('mapInfoCard').classList.remove('show');

  const keywordsMap={
    all:['착한가격업소','무료주차장','도서관','공원','체육센터'],
    cheap:['착한가격업소','가성비 맛집'],
    free:['무료주차장','공원','도서관'],
    class:['문화센터','평생학습','무료강좌']
  };
  const keywords=keywordsMap[cat]||keywordsMap.all;
  let allResults=[];
  let done=0;

  // 현재 지도 중심 좌표 기준 검색
  const center=kakaoMap.getCenter();
  const mapLat=center.getLat();
  const mapLng=center.getLng();
  const level=kakaoMap.getLevel();
  const radius=Math.min(Math.max(level*1500,1000),20000);

  document.getElementById('mapCount').textContent='검색 중...';

  keywords.forEach(kw=>{
    waitForKakao(()=>{
      if(!kakaoPlaces)kakaoPlaces=new kakao.maps.services.Places();
      kakaoPlaces.keywordSearch(kw,(data,status)=>{
        if(status===kakao.maps.services.Status.OK)allResults=allResults.concat(data);
        done++;
        if(done===keywords.length){
          const seen=new Set();
          allResults=allResults.filter(p=>{if(seen.has(p.id))return false;seen.add(p.id);return true});
          document.getElementById('mapCount').textContent=allResults.length+'개 장소';
          allResults.forEach(place=>{
            const markerContent=document.createElement('div');
            markerContent.style.cssText='display:flex;flex-direction:column;align-items:center;cursor:pointer';
            const mLabel=getMarkerLabel(place);
            markerContent.innerHTML=`<img src="marker-icon-2x.png" style="width:36px;height:36px;filter:drop-shadow(0 2px 3px rgba(0,0,0,0.3))"><div style="background:${mLabel.color};color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;margin-top:-4px;white-space:nowrap;box-shadow:0 1px 2px rgba(0,0,0,0.2)">${mLabel.text}</div>`;
            const overlay=new kakao.maps.CustomOverlay({
              position:new kakao.maps.LatLng(place.y,place.x),
              content:markerContent,
              yAnchor:1.2
            });
            overlay.setMap(kakaoMap);
            mapMarkers.push(overlay);
            markerContent.addEventListener('click',()=>{
              showMapInfo(place);
              kakaoMap.panTo(new kakao.maps.LatLng(place.y,place.x));
            });
          });
        }
      },{x:mapLng,y:mapLat,radius:radius,size:15,sort:kakao.maps.services.SortBy.DISTANCE});
    });
  });
}


function showMapInfo(place){
  infoSelectedPlace=place;
  const ml=getMarkerLabel(place);
  const badge=document.getElementById('mapInfoBadge');
  badge.style.background=ml.color;badge.style.color='#fff';
  badge.textContent=ml.text;
  // 착한가격업소 가격 조회
  const pName=place.place_name||'';
  document.getElementById('mapInfoTitle').innerHTML=pName;
  const isCheap=(pName+(place.category_name||'')).includes('착한가격');
  const phoneLink=place.phone?'<a href="tel:'+place.phone+'" style="color:#FF6B35;text-decoration:none;font-weight:600" onclick="event.stopPropagation()">'+place.phone+'</a>':'';
  document.getElementById('mapInfoDesc').innerHTML=(place.category_name||'')+(phoneLink?' · '+phoneLink:'');
  document.getElementById('mapInfoAddr').textContent=place.road_address_name||place.address_name||'';
  // 강좌/문화센터면 홈페이지 링크 버튼 추가
  const catLower=((place.category_name||'')+(place.place_name||'')).toLowerCase();
  const isClass=catLower.includes('문화센터')||catLower.includes('학습')||catLower.includes('강좌')||catLower.includes('도서관')||catLower.includes('체육');
  if(isClass&&place.place_url){
    document.getElementById('mapInfoDist').innerHTML='<a href="'+place.place_url+'" target="_blank" style="display:inline-block;background:#7B1FA2;color:#fff;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;text-decoration:none">강좌/프로그램 확인하기</a>';
  }
  // 가격 정보 조회 (착한가격업소 API에서)
  document.getElementById('mapInfoDist').innerHTML='';
  fetchPriceInfo(pName,place.road_address_name||place.address_name||'');
  document.getElementById('mapInfoCard').classList.add('show');
}

function getMarkerLabel(p){
  const n=((p.place_name||'')+(p.category_name||'')).toLowerCase();
  if(n.includes('착한가격')||n.includes('가성비'))return{color:'#E65100',text:'착한가격'};
  if(n.includes('도서관'))return{color:'#2E7D32',text:'도서관'};
  if(n.includes('공원'))return{color:'#2E7D32',text:'공원'};
  if(n.includes('주차'))return{color:'#1565C0',text:'무료주차'};
  if(n.includes('체육')||n.includes('스포츠'))return{color:'#7B1FA2',text:'체육'};
  if(n.includes('문화')||n.includes('학습')||n.includes('강좌'))return{color:'#7B1FA2',text:'문화'};
  if(n.includes('음식')||n.includes('식당')||n.includes('맛집'))return{color:'#E65100',text:'맛집'};
  return{color:'#455A64',text:'장소'};
}

function fetchPriceInfo(name,addr){
  const distEl=document.getElementById('mapInfoDist');
  // 로컬 JSON에서 업소명 검색
  function doSearch(){
    if(!window._cheapData)return;
    const found=window._cheapData.find(s=>s.n&&(s.n.includes(name)||name.includes(s.n)));
    if(found){
      const menus=[];
      if(found.m1&&found.p1)menus.push('<b>'+found.m1+'</b> '+Number(found.p1).toLocaleString()+'원');
      if(found.m2&&found.p2)menus.push('<b>'+found.m2+'</b> '+Number(found.p2).toLocaleString()+'원');
      if(found.m3&&found.p3)menus.push('<b>'+found.m3+'</b> '+Number(found.p3).toLocaleString()+'원');
      if(menus.length>0){
        distEl.innerHTML='<span style="color:#E65100;font-weight:800;font-size:13px">'+menus.join(' / ')+'</span>';
      }else{
        distEl.innerHTML='<span style="color:#E65100;font-weight:700">착한가격 인증업소</span>';
      }
    }
  }
  if(window._cheapData){doSearch()}
  else{fetch('cheap-data.json').then(r=>r.json()).then(d=>{window._cheapData=d;doSearch()}).catch(()=>{})}
}

  navigator.geolocation.getCurrentPosition(pos=>{
    myLat=pos.coords.latitude;myLng=pos.coords.longitude;
    if(kakaoMap){kakaoMap.setCenter(new kakao.maps.LatLng(myLat,myLng));showMyMarker()}
  },()=>{},{enableHighAccuracy:true,timeout:8000});
});
